name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create Android project
        shell: bash
        run: |
          set -e
          mkdir -p app/src/main/java/com/local/ytaudiointernal
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets

          cat > settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "YouTubeInternalAudioKoSubtitle"
          include(":app")
          EOF

          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.7.3" apply false
          }
          EOF

          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
          }

          android {
              namespace = "com.local.ytaudiointernal"
              compileSdk = 35

              defaultConfig {
                  applicationId = "com.local.ytaudiointernal"
                  minSdk = 29
                  targetSdk = 35
                  versionCode = 3
                  versionName = "3.0"
              }
          }

          dependencies {
              implementation("com.alphacephei:vosk-android:0.3.47")
          }
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:colorAccent">#111111</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MICROPHONE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PROJECTION" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />

              <application
                  android:allowBackup="true"
                  android:label="유튜브 내부음성 한국어 자막"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="false">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".InternalAudioSubtitleService"
                      android:exported="false"
                      android:foregroundServiceType="mediaProjection|microphone" />
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/local/ytaudiointernal/MainActivity.java <<'EOF'
          package com.local.ytaudiointernal;

          import android.Manifest;
          import android.app.Activity;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.media.projection.MediaProjectionManager;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.view.Gravity;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.widget.Toast;

          public class MainActivity extends Activity {
              private static final int REQ_OVERLAY = 11;
              private static final int REQ_AUDIO = 12;
              private static final int REQ_MEDIA_PROJECTION = 13;
              private EditText urlInput;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  buildUi();
              }

              private void buildUi() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER_HORIZONTAL);
                  root.setPadding(dp(18), dp(18), dp(18), dp(18));

                  TextView title = new TextView(this);
                  title.setText("유튜브 내부 음성 → 한국어 실시간 자막");
                  title.setTextSize(20);
                  title.setGravity(Gravity.CENTER);
                  root.addView(title);

                  urlInput = new EditText(this);
                  urlInput.setHint("YouTube URL");
                  urlInput.setSingleLine(true);
                  root.addView(urlInput);

                  Button permButton = new Button(this);
                  permButton.setText("권한 허용");
                  root.addView(permButton);

                  Button startButton = new Button(this);
                  startButton.setText("유튜브 열고 내부음성 자막 시작");
                  root.addView(startButton);

                  Button stopButton = new Button(this);
                  stopButton.setText("자막 중지");
                  root.addView(stopButton);

                  TextView help = new TextView(this);
                  help.setText("이번 버전은 마이크 SpeechRecognizer를 쓰지 않습니다.\n화면/오디오 캡처 권한을 받아서 유튜브 앱의 내부 재생 소리를 캡처하고, Vosk로 영어를 인식한 뒤 한국어로 번역해서 플로팅 자막으로 띄웁니다.\n\n일부 기기/영상/유튜브 정책에서 내부 오디오 캡처가 막히면 소리가 안 잡힐 수 있습니다.");
                  help.setTextSize(14);
                  root.addView(help);

                  permButton.setOnClickListener(v -> requestBasicPermissions());
                  startButton.setOnClickListener(v -> startFlow());
                  stopButton.setOnClickListener(v -> stopService(new Intent(this, InternalAudioSubtitleService.class)));

                  setContentView(root);
              }

              private void requestBasicPermissions() {
                  if (Build.VERSION.SDK_INT >= 23 && !Settings.canDrawOverlays(this)) {
                      Intent intent = new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION);
                      intent.setData(Uri.parse("package:" + getPackageName()));
                      startActivityForResult(intent, REQ_OVERLAY);
                      toast("다른 앱 위에 표시 권한을 허용하세요.");
                      return;
                  }

                  if (Build.VERSION.SDK_INT >= 23 && checkSelfPermission(Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                      requestPermissions(new String[]{Manifest.permission.RECORD_AUDIO}, REQ_AUDIO);
                      return;
                  }

                  if (Build.VERSION.SDK_INT >= 33 && checkSelfPermission(Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                      requestPermissions(new String[]{Manifest.permission.POST_NOTIFICATIONS}, 33);
                      return;
                  }

                  toast("기본 권한 준비 완료");
              }

              private void startFlow() {
                  String url = urlInput.getText().toString().trim();
                  if (url.isEmpty()) {
                      toast("YouTube URL을 넣으세요.");
                      return;
                  }

                  if (Build.VERSION.SDK_INT >= 23 && !Settings.canDrawOverlays(this)) {
                      toast("먼저 다른 앱 위에 표시 권한을 허용하세요.");
                      requestBasicPermissions();
                      return;
                  }

                  if (Build.VERSION.SDK_INT >= 23 && checkSelfPermission(Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                      toast("먼저 마이크/오디오 권한을 허용하세요.");
                      requestBasicPermissions();
                      return;
                  }

                  if (Build.VERSION.SDK_INT >= 33 && checkSelfPermission(Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                      requestBasicPermissions();
                      return;
                  }

                  MediaProjectionManager mpm = (MediaProjectionManager) getSystemService(Context.MEDIA_PROJECTION_SERVICE);
                  Intent captureIntent = mpm.createScreenCaptureIntent();
                  startActivityForResult(captureIntent, REQ_MEDIA_PROJECTION);
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (requestCode == REQ_MEDIA_PROJECTION) {
                      if (resultCode != RESULT_OK || data == null) {
                          toast("화면/오디오 캡처 권한이 필요합니다.");
                          return;
                      }

                      String url = urlInput.getText().toString().trim();

                      Intent service = new Intent(this, InternalAudioSubtitleService.class);
                      service.putExtra("projection_result_code", resultCode);
                      service.putExtra("projection_data", data);

                      if (Build.VERSION.SDK_INT >= 26) {
                          startForegroundService(service);
                      } else {
                          startService(service);
                      }

                      try {
                          Intent yt = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                          yt.setPackage("com.google.android.youtube");
                          startActivity(yt);
                      } catch (Exception e) {
                          startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(url)));
                      }
                  }
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  toast("권한 처리됨");
              }

              private int dp(int v) {
                  return Math.round(v * getResources().getDisplayMetrics().density);
              }

              private void toast(String text) {
                  Toast.makeText(this, text, Toast.LENGTH_SHORT).show();
              }
          }
          EOF

          cat > app/src/main/java/com/local/ytaudiointernal/InternalAudioSubtitleService.java <<'EOF'
          package com.local.ytaudiointernal;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.Service;
          import android.content.Context;
          import android.content.Intent;
          import android.graphics.Color;
          import android.graphics.PixelFormat;
          import android.graphics.Typeface;
          import android.media.AudioAttributes;
          import android.media.AudioFormat;
          import android.media.AudioPlaybackCaptureConfiguration;
          import android.media.AudioRecord;
          import android.media.MediaRecorder;
          import android.media.projection.MediaProjection;
          import android.media.projection.MediaProjectionManager;
          import android.os.Build;
          import android.os.Handler;
          import android.os.IBinder;
          import android.os.Looper;
          import android.view.Gravity;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.WindowManager;
          import android.widget.TextView;

          import org.vosk.Model;
          import org.vosk.Recognizer;
          import org.vosk.android.StorageService;

          import java.io.BufferedReader;
          import java.io.InputStream;
          import java.io.InputStreamReader;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.net.URLEncoder;
          import java.util.concurrent.ExecutorService;
          import java.util.concurrent.Executors;

          public class InternalAudioSubtitleService extends Service {
              private static final int SAMPLE_RATE = 16000;

              private final Handler handler = new Handler(Looper.getMainLooper());
              private final ExecutorService executor = Executors.newCachedThreadPool();

              private WindowManager windowManager;
              private TextView overlayText;

              private MediaProjection mediaProjection;
              private AudioRecord audioRecord;
              private Recognizer recognizer;
              private Model model;

              private volatile boolean running = false;
              private volatile boolean translating = false;
              private String lastPartial = "";
              private String lastFinal = "";
              private long lastPartialTranslateMs = 0;

              @Override
              public void onCreate() {
                  super.onCreate();
                  startAsForeground();
                  createOverlay();
                  setOverlay("내부 오디오 자막 준비 중...");
              }

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if (intent == null) return START_NOT_STICKY;

                  int resultCode = intent.getIntExtra("projection_result_code", -1);
                  Intent data = intent.getParcelableExtra("projection_data");

                  if (resultCode == -1 || data == null) {
                      setOverlay("캡처 권한 정보 없음");
                      stopSelf();
                      return START_NOT_STICKY;
                  }

                  MediaProjectionManager mpm = (MediaProjectionManager) getSystemService(Context.MEDIA_PROJECTION_SERVICE);
                  mediaProjection = mpm.getMediaProjection(resultCode, data);

                  loadModelAndStart();
                  return START_STICKY;
              }

              private void startAsForeground() {
                  String channelId = "internal_audio_subtitle";
                  if (Build.VERSION.SDK_INT >= 26) {
                      NotificationChannel channel = new NotificationChannel(
                              channelId,
                              "Internal Audio Subtitle",
                              NotificationManager.IMPORTANCE_LOW
                      );
                      NotificationManager nm = getSystemService(NotificationManager.class);
                      nm.createNotificationChannel(channel);
                  }

                  Notification.Builder builder = Build.VERSION.SDK_INT >= 26
                          ? new Notification.Builder(this, channelId)
                          : new Notification.Builder(this);

                  Notification notification = builder
                          .setContentTitle("내부음성 한국어 자막 실행 중")
                          .setContentText("유튜브 소리를 인식하고 한국어 자막을 표시합니다.")
                          .setSmallIcon(android.R.drawable.ic_btn_speak_now)
                          .build();

                  startForeground(1, notification);
              }

              private void createOverlay() {
                  windowManager = (WindowManager) getSystemService(WINDOW_SERVICE);

                  overlayText = new TextView(this);
                  overlayText.setText("한국어 자막 준비 중...");
                  overlayText.setTextColor(Color.WHITE);
                  overlayText.setTextSize(23);
                  overlayText.setTypeface(Typeface.DEFAULT_BOLD);
                  overlayText.setGravity(Gravity.CENTER);
                  overlayText.setShadowLayer(6, 2, 2, Color.BLACK);
                  overlayText.setBackgroundColor(Color.argb(178, 0, 0, 0));
                  overlayText.setPadding(dp(14), dp(10), dp(14), dp(10));

                  int type = Build.VERSION.SDK_INT >= 26
                          ? WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY
                          : WindowManager.LayoutParams.TYPE_PHONE;

                  WindowManager.LayoutParams params = new WindowManager.LayoutParams(
                          WindowManager.LayoutParams.MATCH_PARENT,
                          WindowManager.LayoutParams.WRAP_CONTENT,
                          type,
                          WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE
                                  | WindowManager.LayoutParams.FLAG_NOT_TOUCH_MODAL
                                  | WindowManager.LayoutParams.FLAG_LAYOUT_IN_SCREEN,
                          PixelFormat.TRANSLUCENT
                  );

                  params.gravity = Gravity.BOTTOM | Gravity.CENTER_HORIZONTAL;
                  params.y = dp(70);

                  overlayText.setOnTouchListener(new View.OnTouchListener() {
                      float startY;
                      int startParamY;

                      @Override
                      public boolean onTouch(View v, MotionEvent event) {
                          if (event.getAction() == MotionEvent.ACTION_DOWN) {
                              startY = event.getRawY();
                              startParamY = params.y;
                              return true;
                          }
                          if (event.getAction() == MotionEvent.ACTION_MOVE) {
                              params.y = startParamY + (int) (startY - event.getRawY());
                              windowManager.updateViewLayout(overlayText, params);
                              return true;
                          }
                          return true;
                      }
                  });

                  windowManager.addView(overlayText, params);
              }

              private void loadModelAndStart() {
                  setOverlay("영어 인식 모델 불러오는 중...");
                  StorageService.unpack(this, "model-en-us", "model",
                          loadedModel -> {
                              model = loadedModel;
                              setOverlay("모델 준비 완료. 유튜브 소리 캡처 시작...");
                              startAudioCapture();
                          },
                          exception -> {
                              setOverlay("모델 로드 실패: " + exception.getMessage());
                              stopSelf();
                          });
              }

              private void startAudioCapture() {
                  if (mediaProjection == null) {
                      setOverlay("MediaProjection 없음");
                      return;
                  }

                  try {
                      AudioFormat audioFormat = new AudioFormat.Builder()
                              .setEncoding(AudioFormat.ENCODING_PCM_16BIT)
                              .setSampleRate(SAMPLE_RATE)
                              .setChannelMask(AudioFormat.CHANNEL_IN_MONO)
                              .build();

                      AudioPlaybackCaptureConfiguration config =
                              new AudioPlaybackCaptureConfiguration.Builder(mediaProjection)
                                      .addMatchingUsage(AudioAttributes.USAGE_MEDIA)
                                      .addMatchingUsage(AudioAttributes.USAGE_GAME)
                                      .addMatchingUsage(AudioAttributes.USAGE_UNKNOWN)
                                      .build();

                      int minBuffer = AudioRecord.getMinBufferSize(
                              SAMPLE_RATE,
                              AudioFormat.CHANNEL_IN_MONO,
                              AudioFormat.ENCODING_PCM_16BIT
                      );
                      int bufferSize = Math.max(minBuffer, SAMPLE_RATE * 2);

                      audioRecord = new AudioRecord.Builder()
                              .setAudioFormat(audioFormat)
                              .setBufferSizeInBytes(bufferSize)
                              .setAudioPlaybackCaptureConfig(config)
                              .build();

                      recognizer = new Recognizer(model, SAMPLE_RATE);
                      running = true;
                      executor.execute(this::recordLoop);
                  } catch (Exception e) {
                      setOverlay("내부 오디오 캡처 시작 실패: " + e.getMessage());
                  }
              }

              private void recordLoop() {
                  try {
                      byte[] buffer = new byte[4096];
                      audioRecord.startRecording();
                      setOverlay("내부 오디오 듣는 중...");

                      while (running) {
                          int nread = audioRecord.read(buffer, 0, buffer.length);
                          if (nread <= 0) continue;

                          boolean finalResult = recognizer.acceptWaveForm(buffer, nread);
                          if (finalResult) {
                              String text = extractJsonValue(recognizer.getResult(), "text");
                              if (text != null && text.trim().length() > 2 && !text.equalsIgnoreCase(lastFinal)) {
                                  lastFinal = text;
                                  translateAndShow(text, true);
                              }
                          } else {
                              String partial = extractJsonValue(recognizer.getPartialResult(), "partial");
                              long now = System.currentTimeMillis();
                              if (partial != null && partial.trim().length() > 5 && !partial.equalsIgnoreCase(lastPartial)) {
                                  lastPartial = partial;
                                  if (now - lastPartialTranslateMs > 1200) {
                                      lastPartialTranslateMs = now;
                                      translateAndShow(partial, false);
                                  }
                              }
                          }
                      }
                  } catch (Exception e) {
                      setOverlay("인식 오류: " + e.getMessage());
                  }
              }

              private void translateAndShow(String english, boolean finalResult) {
                  if (translating && !finalResult) return;
                  translating = true;

                  executor.execute(() -> {
                      try {
                          String q = URLEncoder.encode(english, "UTF-8");
                          String url = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=" + q;

                          HttpURLConnection conn = (HttpURLConnection) new URL(url).openConnection();
                          conn.setRequestMethod("GET");
                          conn.setConnectTimeout(8000);
                          conn.setReadTimeout(8000);

                          InputStream is = conn.getInputStream();
                          BufferedReader br = new BufferedReader(new InputStreamReader(is));
                          StringBuilder sb = new StringBuilder();
                          String line;
                          while ((line = br.readLine()) != null) sb.append(line);

                          String korean = parseTranslate(sb.toString());
                          if (korean == null || korean.trim().isEmpty()) korean = english;

                          final String show = finalResult ? korean : korean + " …";
                          setOverlay(show);
                      } catch (Exception e) {
                          setOverlay("번역 실패: " + english);
                      } finally {
                          translating = false;
                      }
                  });
              }

              private String parseTranslate(String raw) {
                  try {
                      int a = raw.indexOf("\"");
                      int b = raw.indexOf("\"", a + 1);
                      if (a >= 0 && b > a) {
                          return raw.substring(a + 1, b)
                                  .replace("\\n", "\n")
                                  .replace("\\\"", "\"")
                                  .replace("\\u003c", "<")
                                  .replace("\\u003e", ">");
                      }
                  } catch (Exception ignored) {}
                  return raw;
              }

              private String extractJsonValue(String raw, String key) {
                  try {
                      String needle = "\"" + key + "\"";
                      int k = raw.indexOf(needle);
                      if (k < 0) return "";
                      int colon = raw.indexOf(":", k);
                      int first = raw.indexOf("\"", colon + 1);
                      int second = raw.indexOf("\"", first + 1);
                      if (first >= 0 && second > first) {
                          return raw.substring(first + 1, second)
                                  .replace("\\\"", "\"")
                                  .replace("\\n", " ");
                      }
                  } catch (Exception ignored) {}
                  return "";
              }

              private void setOverlay(String text) {
                  handler.post(() -> {
                      if (overlayText != null) overlayText.setText(text);
                  });
              }

              private int dp(int v) {
                  return Math.round(v * getResources().getDisplayMetrics().density);
              }

              @Override
              public void onDestroy() {
                  running = false;

                  try {
                      if (audioRecord != null) {
                          audioRecord.stop();
                          audioRecord.release();
                      }
                  } catch (Exception ignored) {}

                  try {
                      if (recognizer != null) recognizer.close();
                  } catch (Exception ignored) {}

                  try {
                      if (model != null) model.close();
                  } catch (Exception ignored) {}

                  try {
                      if (mediaProjection != null) mediaProjection.stop();
                  } catch (Exception ignored) {}

                  try {
                      if (overlayText != null && windowManager != null) windowManager.removeView(overlayText);
                  } catch (Exception ignored) {}

                  executor.shutdownNow();
                  super.onDestroy();
              }

              @Override
              public IBinder onBind(Intent intent) {
                  return null;
              }
          }
          EOF

          echo "Downloading Vosk English model..."
          curl -L -o model.zip https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip
          unzip -q model.zip
          mv vosk-model-small-en-us-0.15 app/src/main/assets/model-en-us
          rm model.zip

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: youtube-internal-audio-ko-subtitle-apk
          path: app/build/outputs/apk/debug/app-debug.apk
