name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create Android project
        shell: bash
        run: |
          set -e
          mkdir -p app/src/main/java/com/local/ytaudioko
          mkdir -p app/src/main/res/values

          cat > settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "YouTubeAudioKoLive"
          include(":app")
          EOF

          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.7.3" apply false
          }
          EOF

          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
          }

          android {
              namespace = "com.local.ytaudioko"
              compileSdk = 35

              defaultConfig {
                  applicationId = "com.local.ytaudioko"
                  minSdk = 26
                  targetSdk = 35
                  versionCode = 1
                  versionName = "1.0"
              }
          }
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:colorAccent">#ffffff</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />

              <application
                  android:allowBackup="true"
                  android:label="유튜브 한국어 자막"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="false">
                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/local/ytaudioko/MainActivity.java <<'EOF'
          package com.local.ytaudioko;

          import android.Manifest;
          import android.annotation.SuppressLint;
          import android.app.Activity;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.speech.RecognitionListener;
          import android.speech.RecognizerIntent;
          import android.speech.SpeechRecognizer;
          import android.view.Gravity;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.FrameLayout;
          import android.widget.LinearLayout;
          import android.widget.ProgressBar;
          import android.widget.TextView;
          import android.widget.Toast;

          import java.io.BufferedReader;
          import java.io.InputStream;
          import java.io.InputStreamReader;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.net.URLEncoder;
          import java.util.ArrayList;
          import java.util.Locale;
          import java.util.concurrent.ExecutorService;
          import java.util.concurrent.Executors;

          public class MainActivity extends Activity {
              private static final int REQ_AUDIO = 100;

              private EditText urlInput;
              private Button openButton;
              private Button listenButton;
              private TextView statusText;
              private TextView subtitleText;
              private WebView webView;
              private ProgressBar progressBar;

              private SpeechRecognizer recognizer;
              private Intent speechIntent;
              private boolean listening = false;
              private final Handler handler = new Handler(Looper.getMainLooper());
              private final ExecutorService executor = Executors.newSingleThreadExecutor();
              private String lastFinalText = "";

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  buildUi();
                  prepareRecognizer();
              }

              @SuppressLint("SetJavaScriptEnabled")
              private void buildUi() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(Color.BLACK);

                  LinearLayout top = new LinearLayout(this);
                  top.setOrientation(LinearLayout.VERTICAL);
                  top.setPadding(dp(10), dp(10), dp(10), dp(8));
                  top.setBackgroundColor(Color.rgb(18, 18, 18));

                  TextView title = new TextView(this);
                  title.setText("유튜브 영어 음성 → 한국어 자막");
                  title.setTextColor(Color.WHITE);
                  title.setTextSize(19);
                  title.setGravity(Gravity.CENTER);
                  top.addView(title);

                  urlInput = new EditText(this);
                  urlInput.setHint("YouTube URL");
                  urlInput.setHintTextColor(Color.GRAY);
                  urlInput.setTextColor(Color.WHITE);
                  urlInput.setSingleLine(true);
                  top.addView(urlInput);

                  LinearLayout row = new LinearLayout(this);
                  row.setOrientation(LinearLayout.HORIZONTAL);

                  openButton = new Button(this);
                  openButton.setText("영상 열기");
                  row.addView(openButton, new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1));

                  listenButton = new Button(this);
                  listenButton.setText("음성 인식 시작");
                  row.addView(listenButton, new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1));
                  top.addView(row);

                  progressBar = new ProgressBar(this, null, android.R.attr.progressBarStyleHorizontal);
                  progressBar.setMax(100);
                  progressBar.setProgress(100);
                  top.addView(progressBar);

                  statusText = new TextView(this);
                  statusText.setText("URL 입력 → 영상 열기 → 재생 → 음성 인식 시작");
                  statusText.setTextColor(Color.LTGRAY);
                  statusText.setTextSize(12);
                  top.addView(statusText);

                  root.addView(top);

                  FrameLayout box = new FrameLayout(this);
                  box.setBackgroundColor(Color.BLACK);

                  webView = new WebView(this);
                  WebSettings ws = webView.getSettings();
                  ws.setJavaScriptEnabled(true);
                  ws.setDomStorageEnabled(true);
                  ws.setMediaPlaybackRequiresUserGesture(false);
                  ws.setUseWideViewPort(true);
                  ws.setLoadWithOverviewMode(true);
                  webView.setWebChromeClient(new WebChromeClient());

                  box.addView(webView, new FrameLayout.LayoutParams(
                          FrameLayout.LayoutParams.MATCH_PARENT,
                          FrameLayout.LayoutParams.MATCH_PARENT
                  ));

                  subtitleText = new TextView(this);
                  subtitleText.setText("");
                  subtitleText.setTextColor(Color.WHITE);
                  subtitleText.setTextSize(24);
                  subtitleText.setTypeface(Typeface.DEFAULT_BOLD);
                  subtitleText.setGravity(Gravity.CENTER);
                  subtitleText.setShadowLayer(6, 2, 2, Color.BLACK);
                  subtitleText.setBackgroundColor(Color.argb(170, 0, 0, 0));
                  subtitleText.setPadding(dp(12), dp(8), dp(12), dp(8));

                  FrameLayout.LayoutParams sub = new FrameLayout.LayoutParams(
                          FrameLayout.LayoutParams.MATCH_PARENT,
                          FrameLayout.LayoutParams.WRAP_CONTENT
                  );
                  sub.gravity = Gravity.BOTTOM | Gravity.CENTER_HORIZONTAL;
                  sub.setMargins(dp(8), dp(8), dp(8), dp(24));
                  box.addView(subtitleText, sub);

                  root.addView(box, new LinearLayout.LayoutParams(
                          LinearLayout.LayoutParams.MATCH_PARENT,
                          0,
                          1
                  ));

                  openButton.setOnClickListener(v -> openYoutube());
                  listenButton.setOnClickListener(v -> toggleListening());

                  setContentView(root);
              }

              private void prepareRecognizer() {
                  if (!SpeechRecognizer.isRecognitionAvailable(this)) {
                      status("이 폰에서 음성 인식 서비스를 사용할 수 없습니다.");
                      return;
                  }

                  recognizer = SpeechRecognizer.createSpeechRecognizer(this);
                  speechIntent = new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                  speechIntent.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                  speechIntent.putExtra(RecognizerIntent.EXTRA_LANGUAGE, Locale.US.toLanguageTag());
                  speechIntent.putExtra(RecognizerIntent.EXTRA_PARTIAL_RESULTS, true);
                  speechIntent.putExtra(RecognizerIntent.EXTRA_MAX_RESULTS, 3);

                  recognizer.setRecognitionListener(new RecognitionListener() {
                      @Override public void onReadyForSpeech(Bundle params) {
                          status("듣는 중... 영상 영어 소리를 스피커로 틀어주세요.");
                      }

                      @Override public void onBeginningOfSpeech() {}
                      @Override public void onRmsChanged(float rmsdB) {}
                      @Override public void onBufferReceived(byte[] buffer) {}
                      @Override public void onEndOfSpeech() { restart(); }
                      @Override public void onError(int error) { if (listening) restart(); }

                      @Override public void onResults(Bundle results) {
                          handleResults(results, true);
                          if (listening) restart();
                      }

                      @Override public void onPartialResults(Bundle partialResults) {
                          handleResults(partialResults, false);
                      }

                      @Override public void onEvent(int eventType, Bundle params) {}
                  });
              }

              private void openYoutube() {
                  String videoId = extractVideoId(urlInput.getText().toString().trim());
                  if (videoId == null) {
                      toast("유튜브 URL을 제대로 넣어주세요.");
                      return;
                  }

                  String html = "<html><head><meta name='viewport' content='width=device-width, initial-scale=1.0'>" +
                          "<style>html,body{margin:0;background:#000;height:100%;overflow:hidden;}iframe{width:100%;height:100%;border:0;}</style>" +
                          "</head><body><iframe src='https://www.youtube.com/embed/" + videoId +
                          "?playsinline=1&autoplay=0&cc_load_policy=0' allow='accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share' allowfullscreen></iframe></body></html>";

                  webView.loadDataWithBaseURL("https://www.youtube.com", html, "text/html", "utf-8", null);
                  subtitleText.setText("");
                  status("영상 열림. 재생 후 음성 인식 시작을 누르세요.");
              }

              private void toggleListening() {
                  if (checkSelfPermission(Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                      requestPermissions(new String[]{Manifest.permission.RECORD_AUDIO}, REQ_AUDIO);
                      return;
                  }

                  if (recognizer == null) {
                      toast("음성 인식기를 사용할 수 없습니다.");
                      return;
                  }

                  if (listening) {
                      listening = false;
                      listenButton.setText("음성 인식 시작");
                      try { recognizer.stopListening(); } catch (Exception ignored) {}
                      subtitleText.setText("");
                      status("음성 인식 중지됨.");
                  } else {
                      listening = true;
                      lastFinalText = "";
                      listenButton.setText("음성 인식 중지");
                      startListen();
                  }
              }

              private void startListen() {
                  if (!listening || recognizer == null) return;
                  try {
                      recognizer.cancel();
                      recognizer.startListening(speechIntent);
                  } catch (Exception ignored) {
                      restart();
                  }
              }

              private void restart() {
                  if (listening) handler.postDelayed(this::startListen, 600);
              }

              private void handleResults(Bundle bundle, boolean finalResult) {
                  ArrayList<String> list = bundle.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                  if (list == null || list.isEmpty()) return;

                  String english = list.get(0).trim();
                  if (english.isEmpty()) return;

                  if (!finalResult) {
                      status("인식 중: " + english);
                      return;
                  }

                  if (english.equalsIgnoreCase(lastFinalText)) return;
                  lastFinalText = english;

                  status("영어 인식: " + english + "\n한국어 번역 중...");
                  translateOnline(english);
              }

              private void translateOnline(String english) {
                  executor.execute(() -> {
                      try {
                          String q = URLEncoder.encode(english, "UTF-8");
                          String url = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=" + q;

                          HttpURLConnection conn = (HttpURLConnection) new URL(url).openConnection();
                          conn.setRequestMethod("GET");
                          conn.setConnectTimeout(10000);
                          conn.setReadTimeout(10000);

                          InputStream is = conn.getInputStream();
                          BufferedReader br = new BufferedReader(new InputStreamReader(is));
                          StringBuilder sb = new StringBuilder();
                          String line;
                          while ((line = br.readLine()) != null) sb.append(line);

                          String korean = parseGoogleTranslate(sb.toString());
                          runOnUiThread(() -> {
                              subtitleText.setText(korean);
                              status("영어: " + english + "\n한국어: " + korean);
                          });
                      } catch (Exception e) {
                          runOnUiThread(() -> status("번역 실패: " + e.getMessage()));
                      }
                  });
              }

              private String parseGoogleTranslate(String raw) {
                  try {
                      int firstQuote = raw.indexOf("\"");
                      int secondQuote = raw.indexOf("\"", firstQuote + 1);
                      if (firstQuote >= 0 && secondQuote > firstQuote) {
                          return raw.substring(firstQuote + 1, secondQuote)
                                  .replace("\\n", "\n")
                                  .replace("\\\"", "\"");
                      }
                  } catch (Exception ignored) {}
                  return raw;
              }

              private String extractVideoId(String input) {
                  if (input == null) return null;
                  String[] patterns = new String[]{
                          "v=([A-Za-z0-9_-]{11})",
                          "youtu\\.be/([A-Za-z0-9_-]{11})",
                          "shorts/([A-Za-z0-9_-]{11})",
                          "embed/([A-Za-z0-9_-]{11})"
                  };
                  for (String p : patterns) {
                      java.util.regex.Matcher m = java.util.regex.Pattern.compile(p).matcher(input);
                      if (m.find()) return m.group(1);
                  }
                  if (input.matches("[A-Za-z0-9_-]{11}")) return input;
                  return null;
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == REQ_AUDIO) {
                      if (grantResults.length > 0 && grantResults[0] == PackageManager.PERMISSION_GRANTED) {
                          toggleListening();
                      } else {
                          toast("마이크 권한이 필요합니다.");
                      }
                  }
              }

              private void status(String text) {
                  runOnUiThread(() -> statusText.setText(text));
              }

              private void toast(String text) {
                  Toast.makeText(this, text, Toast.LENGTH_SHORT).show();
              }

              private int dp(int value) {
                  return Math.round(value * getResources().getDisplayMetrics().density);
              }

              @Override
              protected void onDestroy() {
                  listening = false;
                  if (recognizer != null) recognizer.destroy();
                  executor.shutdownNow();
                  super.onDestroy();
              }
          }
          EOF

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: youtube-audio-korean-live-apk
          path: app/build/outputs/apk/debug/app-debug.apk
